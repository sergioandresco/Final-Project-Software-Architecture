name: CD - Main

on:
  push:
    branches: [main]

jobs:
  build-test-deploy:
    name: Build, Test, Push & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore Microservicios_y_Docker/InventoryService.sln

      - name: Build
        run: dotnet build Microservicios_y_Docker/InventoryService.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Microservicios_y_Docker/InventoryService.sln --no-build --configuration Release --verbosity normal

      - name: Generate version
        id: version
        run: |
          TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$TAG" ]; then
            NEW_VERSION="1.0.0"
          else
            VERSION=${TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Microservicios_y_Docker
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-service:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-service:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## Inventory Service ${{ steps.version.outputs.tag }}

            ### Docker image
            ```
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/inventory-service:${{ steps.version.outputs.version }}
            ```
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
